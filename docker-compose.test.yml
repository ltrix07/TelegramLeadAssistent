services:
  test-postgres:
    image: postgres:17.5-bookworm
    environment:
      POSTGRES_DB: app_test
      POSTGRES_USER: app_test
      POSTGRES_PASSWORD: test-only-password
    networks:
      - test-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_test -d app_test"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 2s
    tmpfs:
      - /var/lib/postgresql/data

  tests:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    environment:
      APP_ENV: test
      DATABASE_URL: postgresql+asyncpg://app_test:test-only-password@test-postgres:5432/app_test
      TEST_DATABASE_URL: postgresql+asyncpg://app_test:test-only-password@test-postgres:5432/app_test
    depends_on:
      test-postgres:
        condition: service_healthy
    networks:
      - test-backend
    command: ["pytest", "-q", "-p", "no:cacheprovider", "tests/integration"]

networks:
  test-backend:
    internal: true
