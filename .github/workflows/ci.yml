name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.5-bookworm
        env:
          POSTGRES_DB: app_test
          POSTGRES_USER: app_test
          POSTGRES_PASSWORD: test-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app_test -d app_test"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv==0.11.21

      - name: Run full M1 gate
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://app_test:test-only-password@127.0.0.1:5432/app_test
        run: make ci
